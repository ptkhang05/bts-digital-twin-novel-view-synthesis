name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/constraints-cpu.txt

      - name: Install locked CPU dependencies
        run: |
          python -m pip install pip==26.0.1
          python -m pip install -c requirements/constraints-cpu.txt -e ".[dev,metrics]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest -q

      - name: Build wheel and source distribution
        run: python -m build --no-isolation

      - name: Verify installed dependency graph
        run: python -m pip check
